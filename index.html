function extraerJSON(texto) {

}

// ----------------- scorecard y evaluación -----------------------
// Re-evalúa TODAS las señales pendientes: cada una se califica con
// el primer punto de precio que llegó al menos 6 h después de ella
// (otra señal posterior o el análisis de ahora). Así ninguna señal
// queda sin calificar aunque se hagan varios análisis el mismo día.
function reevaluarHistorial(hist, precioNuevo, ahoraISO) {
    if (!hist.length)
        return hist;
    const puntos = [{ fecha: ahoraISO, precio: precioNuevo }, ...hist];
    return hist.map((h, i) => {
        if (h.evaluacion || !h.precio)
            return h;
        let ref = null;
        for (let k = i; k >= 0; k--) {
            const p = puntos[k];
            const horas = (new Date(p.fecha) - new Date(h.fecha)) / 36e5;
            if (horas >= 6 && p.precio > 0) {
                ref = p;
                break;
            }
        }
        if (!ref)
            return h;
        const cambio = ((ref.precio - h.precio) / h.precio) * 100;
        let acierto;
        if (h.accion === "VENDER")
            acierto = cambio < 0;
        else if (h.accion === "COMPRAR")
            acierto = cambio > 0;
        else
            acierto = Math.abs(cambio) < 5;
        return Object.assign(Object.assign({}, h), { evaluacion: { acierto, cambio } });
    });
}
function calcularScorecard(hist, motor) {
    const fuente = motor ? hist.filter((h) => h.motor === motor) : hist;
    const ev = fuente.filter((h) => h.evaluacion);
    if (!ev.length)
        return null;
    const ops = ev.filter((h) => h.accion !== "CONSERVAR");
    const opsOk = ops.filter((h) => h.evaluacion.acierto).length;
    const cons = ev.filter((h) => h.accion === "CONSERVAR");
    const consOk = cons.filter((h) => h.evaluacion.acierto).length;
    const alta = ev.filter((h) => h.confianza >= 75);
    const altaOk = alta.filter((h) => h.evaluacion.acierto).length;
    const racha = ev
        .slice(0, 5)
        .map((h) => (h.evaluacion.acierto ? "✓" : "✗"))
        .join(" ");
    return {
        total: ev.length,
        ops: ops.length,
        opsOk,
        cons: cons.length,
        consOk,
        alta: alta.length,
        altaOk,
        racha,
    };
}
// --------- aprendizaje: qué tipo de señal acierta más -------------
function analizarAprendizaje(hist) {
    const ev = hist.filter((h) => h.evaluacion);
    if (ev.length < 5)
        return null; // necesita masa mínima
    const grupo = (filtro) => {
        const g = ev.filter(filtro);
        if (!g.length)
            return null;
        const ok = g.filter((h) => h.evaluacion.acierto).length;
        return { n: g.length, ok, pct: Math.round((ok / g.length) * 100) };
    };
    const porPatron = {};
    ev.forEach((h) => {
        const k = h.patron || "NINGUNO";
        if (!porPatron[k])
            porPatron[k] = { n: 0, ok: 0 };
        porPatron[k].n++;
        if (h.evaluacion.acierto)
            porPatron[k].ok++;
    });
    return {
        comprar: grupo((h) => h.accion === "COMPRAR"),
        vender: grupo((h) => h.accion === "VENDER"),
        conservar: grupo((h) => h.accion === "CONSERVAR"),
        scoreAlto: grupo((h) => Math.abs(h.score || 0) >= 60),
        scoreBajo: grupo((h) => Math.abs(h.score || 0) < 60 && h.accion !== "CONSERVAR"),
        confAlta: grupo((h) => h.confianza >= 75),
        confMedia: grupo((h) => h.confianza >= 60 && h.confianza < 75),
        porPatron,
    };
}
