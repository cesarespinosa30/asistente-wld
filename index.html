function fmt(n, d = 2) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Number(n).toLocaleString("es-CL", {
    minimumFractionDigits: d,
    maximumFractionDigits: d,
  });
}

function horaCorta(iso) {
  return new Date(iso).toLocaleTimeString("es-CL", {

  });

function extraerJSON(texto) {
  const limpio = texto.replace(/```json|```/g, "").trim();
  const ini = limpio.indexOf("{");
  const fin = limpio.lastIndexOf("}");
  if (ini === -1 || fin === -1) throw new Error("Sin JSON en la respuesta");
  return JSON.parse(limpio.slice(ini, fin + 1));
}
function numCosto(c) {
  return Math.max(

  );
}

// ----------------- scorecard y evaluación -----------------------
// Re-evalúa TODAS las señales pendientes: cada una se califica con
// el primer punto de precio que llegó al menos 6 h después de ella
// (otra señal posterior o el análisis de ahora). Así ninguna señal
// queda sin calificar aunque se hagan varios análisis el mismo día.
function reevaluarHistorial(hist, precioNuevo, ahoraISO) {
  if (!hist.length) return hist;
  const puntos = [{ fecha: ahoraISO, precio: precioNuevo }, ...hist];
  return hist.map((h, i) => {
    if (h.evaluacion || !h.precio) return h;
    let ref = null;
    for (let k = i; k >= 0; k--) {
      const p = puntos[k];
      const horas = (new Date(p.fecha) - new Date(h.fecha)) / 36e5;
      if (horas >= 6 && p.precio > 0) {
        ref = p;
        break;
      }
    }
    if (!ref) return h;
    const cambio = ((ref.precio - h.precio) / h.precio) * 100;
    let acierto;
    if (h.accion === "VENDER") acierto = cambio < 0;
    else if (h.accion === "COMPRAR") acierto = cambio > 0;
    else acierto = Math.abs(cambio) < 5;
    return { ...h, evaluacion: { acierto, cambio } };
  });
}

function calcularScorecard(hist, motor) {
  const fuente = motor ? hist.filter((h) => h.motor === motor) : hist;
  const ev = fuente.filter((h) => h.evaluacion);
  if (!ev.length) return null;
  const ops = ev.filter((h) => h.accion !== "CONSERVAR");
  const opsOk = ops.filter((h) => h.evaluacion.acierto).length;
  const cons = ev.filter((h) => h.accion === "CONSERVAR");
  const consOk = cons.filter((h) => h.evaluacion.acierto).length;
  const alta = ev.filter((h) => h.confianza >= 75);
  const altaOk = alta.filter((h) => h.evaluacion.acierto).length;
  const racha = ev
    .slice(0, 5)
    .map((h) => (h.evaluacion.acierto ? "✓" : "✗"))
    .join(" ");
  return {
    total: ev.length,
    ops: ops.length,
    opsOk,
    cons: cons.length,
    consOk,
    alta: alta.length,
    altaOk,
    racha,
  };
}

// --------------- reglas deterministas (el código veta) ----------
function aplicarReglas(j, hist, ahoraMs) {
  const notas = [];
  let res = { ...j };
  if (res.accion !== "CONSERVAR") {
    const semana = hist.filter(
      (h) =>
        ahoraMs - new Date(h.fecha).getTime() < 7 * 864e5 &&
        h.accion !== "CONSERVAR" &&
        h.ejecutada !== "no"
    );
    if (semana.length >= 3) {
      res.accion = "CONSERVAR";
      res.porcentaje = 0;
      notas.push("Regla aplicada: tope de 3 operaciones por semana alcanzado.");
    }
  }
  if (res.accion !== "CONSERVAR") {
    const ult = hist.find((h) => h.accion !== "CONSERVAR");
    if (ult && ult.accion !== res.accion) {
      const horas = (ahoraMs - new Date(ult.fecha).getTime()) / 36e5;
      const mov =
        ult.precio > 0
          ? Math.abs(((res.precio_usd - ult.precio) / ult.precio) * 100)
          : 100;
      if (horas < 48 && mov < 8) {
        res.accion = "CONSERVAR";
        res.porcentaje = 0;
        notas.push(
          `Regla anti-zigzag: contradecía un ${ult.accion} de hace ${Math.round(
            horas
          )} h con el precio movido solo ${fmt(mov, 1)}%.`
        );
      }
    }
  }
  return [res, notas];
}

FASE 0 — RADAR MACRO (ejecutar PRIMERO)
════════════════════════════════════════
Antes de mirar WLD, busca los titulares de las últimas 6-12 horas en Reuters, Associated Press, Bloomberg o Financial Times. Evalúa si hay algún hecho de relevancia global que pueda mover los mercados financieros. Revisa estas categorías:

· GEOPOLÍTICA: conflictos militares activos, ataques, escaladas, sanciones (ej: conflicto EEUU-Irán en curso desde feb 2026, cualquier novedad hoy)
· BANCOS CENTRALES: decisiones de tasas Fed/BCE/BancoJapón, declaraciones inesperadas hawkish o dovish
· DATOS ECONÓMICOS: IPC sorpresa, datos de empleo, PIB de economías del G7
· REGULACIÓN CRIPTO: acciones SEC, CFTC, Treasury, nuevas prohibiciones o aprobaciones en países grandes
· COMMODITIES: petróleo ±10% (señal de tensión geopolítica o recesión), spike de oro (miedo real)
· CRISIS FINANCIERAS: quiebras bancarias sistémicas, defaults soberanos, contagio de mercados
· POLÍTICA MAYOR: elecciones en países G20, cambios de gobierno que afecten política monetaria o cripto

Proceso de evaluación macro:
1. Si hay titular relevante: determina si ya está reflejado en el precio de BTC (evento viejo) o es noticia fresca (precio aún no reaccionó)
2. Clasifícalo:
   - SISTÉMICO: afecta el sentimiento global por días/semanas (guerra que escala, crisis bancaria, Fed hawkish sorpresa)
   - TEMPORAL: shock de horas ya siendo absorbido (dato económico mixto, rumor sin confirmar)
   - POSITIVO_MACRO: ceasefire, Fed dovish, dato inflación mejor al esperado
3. Regla de aplicación:
   - Si evento SISTÉMICO NEGATIVO y BTC cae >4% por él: sesgo global → CONSERVAR para WLD, salvo catalizador propio extraordinario
   - Si evento POSITIVO_MACRO y BTC sube >3%: sesgo favorable, peso extra a señales alcistas de WLD
   - Si evento TEMPORAL o sin novedad relevante: macro_impacto = "NEUTRAL", continúa al análisis de WLD

  }
  const confMin = defensivo ? 70 : 60;

// ------- gráfico de evolución del capital (SVG sin librerías) -----
function MiniGrafico({ serie, baseVal }) {
  const W = 320,
    H = 130,
    P = 12;
  const ys = serie.map((s) => s.equiv);
  let min = Math.min(...ys),
    max = Math.max(...ys);
  if (baseVal) {
    min = Math.min(min, baseVal);
    max = Math.max(max, baseVal);
  }
  if (max - min < 1e-9) {
    min -= 1;
    max += 1;
  }
  const rango = max - min;
  min -= rango * 0.08;
  max += rango * 0.08;
  const X = (i) => P + (i * (W - 2 * P)) / Math.max(serie.length - 1, 1);
  const Y = (v) => H - P - ((v - min) * (H - 2 * P)) / (max - min);
  const path = serie
    .map(
      (s, i) => `${i ? "L" : "M"}${X(i).toFixed(1)} ${Y(s.equiv).toFixed(1)}`
    )
    .join(" ");
  const ultimo = serie[serie.length - 1].equiv;
  const sube = baseVal ? ultimo >= baseVal : ultimo >= serie[0].equiv;
  const col = sube ? "#3BCE82" : "#E2533F";
  return (
    <svg
      viewBox={`0 0 ${W} ${H}`}
      style={{ width: "100%", height: "auto", display: "block" }}
    >
      {baseVal && (
        <>
          <line
            x1={P}
            x2={W - P}
            y1={Y(baseVal)}
            y2={Y(baseVal)}
            stroke="#C8A24A"
            strokeDasharray="4 4"
            strokeWidth="1"
          />
          <text
            x={W - P}
            y={Y(baseVal) - 4}
            textAnchor="end"
            fontSize="9"
            fill="#C8A24A"
          >
            inicio: {fmt(baseVal, 1)}
          </text>
        </>
      )}
      <path
        d={path}
        fill="none"
        stroke={col}
        strokeWidth="2"
        strokeLinejoin="round"
        strokeLinecap="round"
      />
      {serie.map((s, i) => (
        <circle key={i} cx={X(i)} cy={Y(s.equiv)} r="2.5" fill={col} />
      ))}
    </svg>
  );
}

  const [fase, setFase] = useState(0);
  const [error, setError] = useState(null);
  const [vista, setVista] = useState("hoy");
  const [copiado, setCopiado] = useState(false);
  const [verBase, setVerBase] = useState(false);
  const [msgAjustes, setMsgAjustes] = useState(null);
  const [confirmaBorrar, setConfirmaBorrar] = useState(false);
  const [apiKey, setApiKey] = useState(
    localStorage.getItem("wld-api-key") || ""
  );
  const [keyGuardada, setKeyGuardada] = useState(false);
  const [pidiendoMotivo, setPidiendoMotivo] = useState(false);
  const [probe, setProbe] = useState(null);
  const [pegando, setPegando] = useState(false);
  const [textoRespaldo, setTextoRespaldo] = useState("");
  const faseRef = useRef(null);
  const fileRef = useRef(null);

  const FASES = [
    "Escaneando titulares Reuters, AP, Bloomberg…",
    "Evaluando impacto macro en cripto…",
    "Revisando catalizadores de WLD…",
    "Comparando con patrones históricos…",
    "Calculando la señal…",
  ];

  useEffect(() => {
    (async () => {
      const s = await loadState();
      if (s) {
        if (s.wld) setWld(String(s.wld));
        if (s.usdc) setUsdc(String(s.usdc));
        if (s.costo) setCosto(String(s.costo));
        if (s.historial) setHistorial(migrarHistorial(s.historial));
        if (s.base) setBase(s.base);
        if (s.ultimo) setResultado(s.ultimo);

      }
      setCargandoEstado(false);
      // sonda de memoria: verifica que el almacenamiento persiste
      try {
        const pr = await window.storage.get("wld-sonda");
        setProbe({ ok: true, desde: JSON.parse(pr.value).desde });

        try {
          const desde = hoyISO();

            "wld-sonda",
            JSON.stringify({ desde })
          );
          setProbe({ ok: true, desde });
        } catch (e2) {
          setProbe({ ok: false });
        }
      }
    })();
  }, []);

  function persistir(over = {}) {
    saveState({
      wld: parseFloat(wld) || 0,
      usdc: parseFloat(usdc) || 0,
      costo: numCosto(costo),
      historial,
      base,
      ultimo: resultado,
      notasReglas,
      ...over,
    });
  }

  const pendienteConfirmar =
    historial.length > 0 &&
    historial[0].accion !== "CONSERVAR" &&
    !historial[0].ejecutada;

  function confirmarEjecucion(valor) {
    const nuevo = [
      { ...historial[0], ejecutada: valor },
      ...historial.slice(1),
    ];
    setHistorial(nuevo);
    persistir({ historial: nuevo });
    if (valor === "no") setPidiendoMotivo(true);
  }

  function setMotivoNo(m) {
    if (m !== "omitir" && historial.length) {
      const nuevo = [
        { ...historial[0], ejecutada: "no", motivo_no: m },
        ...historial.slice(1),
      ];
      setHistorial(nuevo);
      persistir({ historial: nuevo });
    }
    setPidiendoMotivo(false);
  }

  async function ejecutarAnalisis() {
    const w = parseFloat(wld);
    const u = parseFloat(usdc) || 0;
    if (!w || w <= 0) {
      setError("Ingresa cuántos WLD tienes hoy.");
      return;
    }
    if (pendienteConfirmar) {
      setError(
        "Primero dime si ejecutaste la señal anterior — sin eso el scorecard miente."
      );
      return;
    }
    if (!localStorage.getItem("wld-api-key")) {
      setError(
        "Falta configurar tu llave del motor. Ve a Ajustes → 'Llave del motor' y pégala ahí (un solo paso, una sola vez)."
      );
      return;
    }
    setError(null);
    setAnalizando(true);
    setResultado(null);
    setNotasReglas([]);
    setPendiente(null);
    setFase(0);
    faseRef.current = setInterval(
      () => setFase((f) => Math.min(f + 1, FASES.length - 1)),
      3500
    );
    try {
      const scorecard = calcularScorecard(historial, MOTOR_VERSION);
      const precioPrevio = historial[0]?.precio || 0;
      const equivPrevio = precioPrevio > 0 ? w + u / precioPrevio : w;
      const defensivo = !!(
        base &&
        base.equiv > 0 &&
        equivPrevio < base.equiv * 0.92
      );
      const j = await analizarMercado({
        wld: w,
        usdc: u,
        costo: numCosto(costo),
        hist: historial,
        scorecard,
        defensivo,
      });
      const prev = historial[0];
      if (
        prev &&
        prev.precio > 0 &&
        Date.now() - new Date(prev.fecha).getTime() < 3 * 864e5 &&
        Math.abs((j.precio_usd - prev.precio) / prev.precio) > 0.35
      ) {
        setPendiente(j);
      } else {
        finalizarAnalisis(j, w, u);
      }
    } catch (e) {
      console.error(e);
      setError(
        e && e.message === "APIKEY"
          ? "La llave no es válida o no tiene crédito. Revísala en Ajustes → Llave del motor."
          : "No se pudo completar el análisis. Revisa tu conexión e inténtalo de nuevo."
      );
    } finally {
      clearInterval(faseRef.current);
      setAnalizando(false);
    }
  }

  function finalizarAnalisis(j, w, u) {
    const ahora = hoyISO();
    const [jr, notas] = aplicarReglas(j, historial, Date.now());
    const equivNuevo = w + (jr.precio_usd > 0 ? u / jr.precio_usd : 0);
    if (base && base.equiv > 0 && equivNuevo < base.equiv * 0.92) {
      notas.push(
        "Modo defensivo: vas -8% o más en tokens vs tu inicio. El motor exige confianza ≥70 y solo setups de máxima calidad hasta recuperar terreno."
      );
    }
    let histEval = reevaluarHistorial(historial, jr.precio_usd, ahora);
    const equiv = w + (jr.precio_usd > 0 ? u / jr.precio_usd : 0);
    const entrada = {
      fecha: ahora,
      wld: w,
      usdc: u,
      equiv,
      precio: jr.precio_usd,
      accion: jr.accion,
      porcentaje: jr.porcentaje,
      confianza: jr.confianza,
      razonamiento: jr.razonamiento,
      invalidacion: jr.invalidacion || null,
      patron: jr.patron || "NINGUNO",
      motor: MOTOR_VERSION,
      score: typeof jr.score === "number" ? jr.score : null,
      nivel_baja: jr.nivel_revision_baja || null,
      nivel_alza: jr.nivel_revision_alza || null,
      ejecutada: jr.accion === "CONSERVAR" ? "n/a" : null,
      evaluacion: null,
    };
    const nuevoHist = [entrada, ...histEval].slice(0, 200);
    const nuevaBase = base || { equiv, fecha: ahora };
    setHistorial(nuevoHist);
    setBase(nuevaBase);
    setResultado(jr);
    setNotasReglas(notas);
    setPendiente(null);
    saveState({
      wld: w,
      usdc: u,
      costo: numCosto(costo),
      historial: nuevoHist,
      base: nuevaBase,
      ultimo: jr,
      notasReglas: notas,
    });
  }

  function reiniciarBase() {
    const w2 = parseFloat(wld) || 0;
    const u2 = parseFloat(usdc) || 0;
    const p = resultado?.precio_usd || historial[0]?.precio || 0;
    if (!w2 && !u2) {

  function borrarHistorial() {
    if (!confirmaBorrar) {
      setConfirmaBorrar(true);
      setTimeout(() => setConfirmaBorrar(false), 4000);
      return;
    }
    setConfirmaBorrar(false);

      ultimo: resultado,

    };

    try {
      await navigator.clipboard.writeText(txt);
      ok = true;
    } catch (e) {
      try {
        const ta = document.createElement("textarea");
        ta.value = txt;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        ok = document.execCommand("copy");
        document.body.removeChild(ta);
      } catch (e2) {
        ok = false;
      }
    }
    setMsgAjustes(
      ok
        ? "✓ Respaldo copiado. Pégalo en una nota o WhatsApp contigo mismo."
        : "⚠ No se pudo copiar."
    );
    setTimeout(() => setMsgAjustes(null), 3500);
  }

                  <div
                    style={{
                      fontFamily: "'Space Grotesk', sans-serif",
                      fontWeight: 700,
                      fontSize: 28,
                    }}
                  >
                    {fmt(equivAhora, 1)}{" "}
                    <span style={{ fontSize: 14, color: C.dim }}>
                      WLD equiv.
                    </span>
                  </div>
                  <div style={{ color: C.faint, fontSize: 12 }}>
                    {base
                      ? `Inicio: ${fmt(base.equiv, 1)} el ${fechaCorta(
                          base.fecha
                        )}`
                      : "Sin línea base todavía"}
                  </div>
                </div>
                {crecimiento !== null && (
                  <div
                    style={{
                      fontFamily: "'IBM Plex Mono', monospace",
                      fontSize: 20,
                      fontWeight: 600,
                      color: crecimiento >= 0 ? C.buy : C.sell,
                    }}
                  >
                    {crecimiento >= 0 ? "+" : ""}
                    {fmt(crecimiento, 2)}%
                  </div>
                )}
              </div>
              <div style={{ color: C.faint, fontSize: 11, marginTop: 8 }}>
                Tu rendimiento real contra HODL: si es positivo, operar te ha
                dado más tokens que no hacer nada.
              </div>
            </section>

            {/* evolución del capital */}
            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <div
                style={{
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  marginBottom: 8,
                }}
              >
                Evolución del capital (en WLD)
              </div>
              {serieEquiv.length >= 2 ? (
                <>
                  <MiniGrafico serie={serieEquiv} baseVal={base?.equiv} />
                  <div
                    className="flex justify-between mt-1"
                    style={{ color: C.faint, fontSize: 11 }}
                  >
                    <span>{fechaCorta(serieEquiv[0].fecha)}</span>
                    <span
                      style={{
                        fontFamily: "'IBM Plex Mono', monospace",
                        color:
                          serieEquiv[serieEquiv.length - 1].equiv >=
                          (base?.equiv || serieEquiv[0].equiv)
                            ? C.buy
                            : C.sell,
                      }}
                    >
                      {fmt(serieEquiv[serieEquiv.length - 1].equiv, 1)} WLD
                      equiv.
                    </span>
                    <span>
                      {fechaCorta(serieEquiv[serieEquiv.length - 1].fecha)}
                    </span>
                  </div>
                  <div style={{ color: C.faint, fontSize: 11, marginTop: 6 }}>
                    Cada punto es un análisis. La línea punteada dorada es tu
                    punto de partida: encima de ella vas ganando tokens.
                  </div>
                </>
              ) : (
                <div style={{ color: C.faint, fontSize: 13 }}>
                  El gráfico se dibuja desde tu segundo análisis.
                </div>
              )}
            </section>

            {/* aciertos y desaciertos */}
            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <div
                style={{
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                }}
              >
                Aciertos y desaciertos ({evaluadas.length})
              </div>
              {evaluadas.length === 0 ? (
                <div style={{ color: C.faint, fontSize: 13, marginTop: 8 }}>
                  Cada señal se califica con el precio de tu siguiente visita.
                  Los resultados aparecerán aquí.
                </div>
              ) : (
                evaluadas.map((h, i) => (
                  <div
                    key={i}
                    className="flex justify-between items-center"
                    style={{
                      borderTop: i === 0 ? "none" : `1px solid ${C.line}`,
                      padding: "9px 0",
                      marginTop: i === 0 ? 8 : 0,
                    }}
                  >
                    <div className="flex items-center gap-2">
                      <span
                        style={{
                          color: h.evaluacion.acierto ? C.buy : C.sell,
                          fontWeight: 700,
                          fontSize: 16,
                        }}
                      >
                        {h.evaluacion.acierto ? "✓" : "✗"}
                      </span>
                      <span
                        style={{
                          fontFamily: "'Space Grotesk', sans-serif",
                          fontWeight: 600,
                          fontSize: 13,
                          color:
                            h.accion === "COMPRAR"
                              ? C.buy
                              : h.accion === "VENDER"
                              ? C.sell
                              : C.hold,
                        }}
                      >
                        {h.accion}
                        {h.porcentaje > 0 ? ` ${h.porcentaje}%` : ""}
                      </span>
                      <span style={{ color: C.faint, fontSize: 11 }}>
                        {fechaCorta(h.fecha)}
                      </span>
                    </div>
                    <span
                      style={{
                        fontFamily: "'IBM Plex Mono', monospace",
                        fontSize: 12,
                        color: h.evaluacion.acierto ? C.buy : C.sell,
                      }}
                    >
                      precio luego {h.evaluacion.cambio >= 0 ? "+" : ""}
                      {fmt(h.evaluacion.cambio, 1)}%
                    </span>
                  </div>
                ))
              )}
            </section>

            <div
              style={{
                color: C.dim,
                fontSize: 11,
                letterSpacing: "0.12em",
                textTransform: "uppercase",
                marginBottom: 8,
              }}
            >
              Registro completo
            </div>

            {historial.length === 0 ? (
              <div
                className="text-center mt-10"
                style={{ color: C.faint, fontSize: 14 }}
              >
                Aún no hay señales guardadas.
              </div>
            ) : (
              historial.map((h, i) => (
                <div
                  key={i}
                  className="rounded-xl px-4 py-3 mb-2"
                  style={cardStyle}
                >
                  <div className="flex justify-between items-center">
                    <div
                      style={{
                        fontFamily: "'Space Grotesk', sans-serif",
                        fontWeight: 700,
                        fontSize: 14,
                        color:
                          h.accion === "COMPRAR"
                            ? C.buy
                            : h.accion === "VENDER"
                            ? C.sell
                            : C.hold,
                      }}
                    >
                      {h.accion}
                      {h.porcentaje > 0 ? ` ${h.porcentaje}%` : ""}
                      {h.patron && h.patron !== "NINGUNO" && (
                        <span
                          style={{
                            color: C.orb,
                            fontWeight: 400,
                            fontSize: 11,
                            marginLeft: 6,
                          }}
                        >
                          {h.patron.split("_")[0]}
                        </span>
                      )}
                    </div>
                    <div style={{ color: C.faint, fontSize: 12 }}>
                      {fechaCorta(h.fecha)} · {horaCorta(h.fecha)}
                    </div>
                  </div>
                  <div
                    className="flex justify-between mt-1"
                    style={{
                      fontFamily: "'IBM Plex Mono', monospace",
                      fontSize: 12,
                      color: C.dim,
                    }}
                  >
                    <span>${fmt(h.precio, 4)}</span>
                    <span>
                      {fmt(h.wld, 1)} WLD · {fmt(h.usdc, 0)} USDC
                    </span>
                  </div>
                  <div
                    className="flex justify-between mt-1"
                    style={{ fontSize: 12 }}
                  >
                    <span style={{ color: C.faint }}>
                      {h.ejecutada === "si"
                        ? "✓ Ejecutada"
                        : h.ejecutada === "parcial"
                        ? "◐ Parcial"
                        : h.ejecutada === "no"
                        ? "✗ No ejecutada" +
                          (h.motivo_no ? " · " + h.motivo_no : "")
                        : h.ejecutada === "n/a"
                        ? ""
                        : "Pendiente de confirmar"}
                    </span>
                    {h.evaluacion && (
                      <span
                        style={{
                          color: h.evaluacion.acierto ? C.buy : C.sell,
                          fontWeight: 600,
                        }}
                      >
                        {h.evaluacion.acierto ? "✓ Acertó" : "✗ Falló"} (
                        {h.evaluacion.cambio >= 0 ? "+" : ""}
                        {fmt(h.evaluacion.cambio, 1)}%)
                      </span>
                    )}
                  </div>
                </div>
              ))
            )}
          </main>
        ) : (
          <main className="aparecer">
            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <div
                style={{
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  marginBottom: 6,
                }}
              >
                Memoria del dispositivo
              </div>
              <div style={{ fontSize: 13, lineHeight: 1.5 }}>
                {probe === null ? (
                  <span style={{ color: C.faint }}>Verificando…</span>
                ) : probe.ok ? (
                  <span>
                    <span style={{ color: C.buy, fontWeight: 600 }}>
                      ✓ Activa
                    </span>{" "}
                    · guardando desde {fechaCorta(probe.desde)} ·{" "}
                    {historial.length} señal{historial.length === 1 ? "" : "es"}{" "}
                    en el historial
                  </span>
                ) : (
                  <span style={{ color: C.sell }}>
                    ⚠ El almacenamiento no responde en este entorno. Usa
                    "Copiar informe" como respaldo antes de cerrar.
                  </span>
                )}
              </div>
              <div style={{ color: C.faint, fontSize: 11, marginTop: 6 }}>
                Si la fecha "guardando desde" se reinicia sola, avísale a
                Claude: significa que el entorno borró la memoria.
              </div>
            </section>

            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <div
                style={{
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  marginBottom: 8,
                }}
              >
                Llave del motor (API key de Anthropic)
              </div>
              <input
                type="password"
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value.trim())}
                placeholder="sk-ant-..."
                className="w-full rounded-xl px-3 py-3"
                style={{
                  background: C.panel2,
                  border: `1px solid ${C.line}`,
                  color: C.bone,
                  fontFamily: "'IBM Plex Mono', monospace",
                  fontSize: 14,
                }}
              />
              <button
                onClick={() => {
                  localStorage.setItem("wld-api-key", apiKey);
                  setKeyGuardada(true);
                  setTimeout(() => setKeyGuardada(false), 2500);
                }}
                className="w-full rounded-xl py-3 mt-3"
                style={{
                  background: keyGuardada
                    ? "rgba(59,206,130,0.12)"
                    : C.bone,
                  color: keyGuardada ? C.buy : C.ink,
                  border: `1px solid ${keyGuardada ? C.buy : C.bone}`,
                  fontWeight: 700,
                  fontSize: 14,
                  cursor: "pointer",
                }}
              >
                {keyGuardada
                  ? "✓ Llave guardada en este teléfono"
                  : "Guardar llave"}
              </button>
              <div
                style={{
                  color: C.faint,
                  fontSize: 11,
                  marginTop: 8,
                  lineHeight: 1.5,
                }}
              >
                La llave queda guardada solo en este dispositivo. Cada
                análisis consume ~US$0,05-0,10 de tu crédito en Anthropic.
              </div>
            </section>

            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <div
                style={{
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  marginBottom: 8,
                }}
              >
                Costo por ciclo (vender + recomprar)
              </div>
              <div className="flex items-center gap-3">
                <input
                  inputMode="decimal"
                  value={costo}
                  onChange={(e) => setCosto(e.target.value)}
                  onBlur={() => {
                    setCosto(String(numCosto(costo)));
                    persistir();
                  }}
                  className="rounded-xl px-3 py-3 w-28"
                  style={{
                    background: C.panel2,
                    border: `1px solid ${C.line}`,
                    color: C.bone,
                    fontFamily: "'IBM Plex Mono', monospace",
                    fontSize: 18,
                  }}
                />
                <span style={{ color: C.dim }}>%</span>
              </div>
              <div style={{ color: C.faint, fontSize: 12, marginTop: 8 }}>
                Según tu test en World App el costo real ronda 0,15–0,3%.
              </div>
            </section>

            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <div
                style={{
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  marginBottom: 8,
                }}
              >
                Reglas activas del motor
              </div>
              <div style={{ fontSize: 13, color: C.dim, lineHeight: 1.7 }}>
                🛡 Máximo 3 operaciones por semana
                <br />
                🛡 Anti-zigzag: sin reversas en 48 h salvo movimiento &gt;8%
                <br />
                🛡 Confianza &lt;60% fuerza CONSERVAR
                <br />
                🛡 Máximo 25% de la posición por operación
                <br />
                🛡 Verificación de cordura si el precio difiere &gt;35%
                <br />
                🛡 Radar macro Fase 0 + clasificación de patrón histórico
                <br />
                🛡 Anti-cuchillo: comprar exige caída estabilizada (24h &gt;
                -2%, 5d &gt; -4%)
                <br />
                🛡 Modo defensivo: si vas -8% vs inicio, confianza mínima sube
                a 70
              </div>
            </section>

            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <button
                onClick={() => setVerBase(!verBase)}
                className="w-full flex justify-between items-center"
                style={{
                  background: "transparent",
                  border: "none",
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  cursor: "pointer",
                  padding: 0,
                }}
              >
                <span>Base histórica de catalizadores ({BASE_HISTORICA.length})</span>
                <span style={{ fontSize: 14 }}>{verBase ? "−" : "+"}</span>
              </button>
              {verBase && (
                <div className="mt-3">
                  {BASE_HISTORICA.map((ev, i) => (
                    <div
                      key={i}
                      style={{
                        borderTop: `1px solid ${C.line}`,
                        padding: "8px 0",
                        fontSize: 12,
                        lineHeight: 1.5,
                      }}
                    >
                      <div className="flex justify-between">
                        <span
                          style={{
                            fontFamily: "'IBM Plex Mono', monospace",
                            color: C.dim,
                          }}
                        >
                          {ev.f}
                        </span>
                        <span
                          style={{
                            color: C.orb,
                            fontSize: 10,
                            letterSpacing: "0.08em",
                          }}
                        >
                          {ev.t}
                        </span>
                      </div>
                      <div style={{ color: C.bone, marginTop: 2 }}>{ev.e}</div>
                    </div>
                  ))}
                  <div
                    style={{
                      color: C.faint,
                      fontSize: 11,
                      marginTop: 8,
                      lineHeight: 1.5,
                    }}
                  >
                    Esta base alimenta los 7 patrones que el motor usa para
                    clasificar cada situación. Se actualiza con cada versión de
                    la app.
                  </div>
                </div>
              )}
            </section>

            {msgAjustes && (
              <div
                className="rounded-xl px-4 py-3 mb-3 aparecer"
                style={{
                  background: msgAjustes.startsWith("✓")
                    ? "rgba(59,206,130,0.1)"
                    : "rgba(200,162,74,0.1)",
                  border: `1px solid ${
                    msgAjustes.startsWith("✓") ? C.buy : C.hold
                  }`,
                  fontSize: 13,
                  lineHeight: 1.5,
                }}
              >
                {msgAjustes}
              </div>
            )}

            <section className="rounded-2xl p-4 mb-4" style={cardStyle}>
              <div
                style={{
                  color: C.dim,
                  fontSize: 11,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  marginBottom: 8,
                }}
              >
                Respaldo de datos
              </div>
              <div className="flex gap-2">
                <button
                  onClick={descargarRespaldo}
                  className="flex-1 rounded-xl py-3"
                  style={{
                    background: C.panel2,
                    border: `1px solid ${C.line}`,
                    color: C.bone,
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  ⬇ Descargar respaldo
                </button>
                <button
                  onClick={() => fileRef.current && fileRef.current.click()}
                  className="flex-1 rounded-xl py-3"
                  style={{
                    background: C.panel2,
                    border: `1px solid ${C.line}`,
                    color: C.bone,
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  ⬆ Restaurar respaldo
                </button>
              </div>
              <input
                ref={fileRef}
                type="file"
                accept=".json,application/json"
                onChange={restaurarArchivo}
                style={{ display: "none" }}
              />
              <div className="flex gap-2 mt-2">
                <button
                  onClick={copiarRespaldo}
                  className="flex-1 rounded-xl py-3"
                  style={{
                    background: C.panel2,
                    border: `1px solid ${C.line}`,
                    color: C.bone,
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  ⧉ Copiar respaldo
                </button>
                <button
                  onClick={() => setPegando(!pegando)}
                  className="flex-1 rounded-xl py-3"
                  style={{
                    background: pegando ? C.panel : C.panel2,
                    border: `1px solid ${pegando ? C.orb : C.line}`,
                    color: C.bone,
                    fontSize: 13,
                    fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  📥 Pegar respaldo
                </button>
              </div>
              {pegando && (
                <div className="mt-2 aparecer">
                  <textarea
                    value={textoRespaldo}
                    onChange={(e) => setTextoRespaldo(e.target.value)}
                    placeholder='Pega aquí el texto del respaldo (empieza con {"schema":3...)'
                    rows={4}
                    className="w-full rounded-xl px-3 py-3"
                    style={{
                      background: C.panel2,
                      border: `1px solid ${C.line}`,
                      color: C.bone,
                      fontFamily: "'IBM Plex Mono', monospace",
                      fontSize: 12,
                      resize: "vertical",
                    }}
                  />
                  <button
                    onClick={restaurarDesdeTexto}
                    disabled={!textoRespaldo.trim()}
                    className="w-full rounded-xl py-3 mt-2"
                    style={{
                      background: textoRespaldo.trim() ? C.bone : C.panel2,
                      color: textoRespaldo.trim() ? C.ink : C.faint,
                      border: "none",
                      fontWeight: 700,
                      fontSize: 14,
                      cursor: textoRespaldo.trim() ? "pointer" : "default",
                    }}
                  >
                    Restaurar desde el texto pegado
                  </button>
                </div>
              )}
              <div style={{ color: C.faint, fontSize: 11, marginTop: 8 }}>
                Incluye historial, scorecard, línea base y posición. Guarda el
                archivo en Drive o envíatelo por WhatsApp.
              </div>
            </section>

            <button
              onClick={reiniciarBase}
              className="w-full rounded-xl py-3 mb-3"
              style={{
                background: C.panel,
                border: `1px solid ${C.line}`,
                color: C.bone,
                fontSize: 14,
                cursor: "pointer",
              }}
            >
              Fijar la línea base en mi posición actual
            </button>
            <button
              onClick={borrarHistorial}
              className="w-full rounded-xl py-3"
              style={{
                background: confirmaBorrar
                  ? "rgba(226,83,63,0.15)"
                  : "transparent",
                border: `1px solid ${C.sell}`,
                color: C.sell,
                fontSize: 14,
                fontWeight: confirmaBorrar ? 700 : 400,
                cursor: "pointer",
              }}
            >
              {confirmaBorrar
                ? "¿Seguro? Toca de nuevo para borrar todo"
                : "Borrar historial y línea base"}
            </button>
          </main>
        )}
      </div>

      <nav
        className="fixed bottom-0 left-0 right-0"
        style={{
          background: "rgba(12,14,17,0.92)",
          backdropFilter: "blur(10px)",
          borderTop: `1px solid ${C.line}`,
        }}
      >
        <div className="max-w-md mx-auto flex">
          {[
            ["hoy", "Hoy"],
            ["historial", "Historial"],
            ["ajustes", "Ajustes"],
          ].map(([id, label]) => (
            <button
              key={id}
              onClick={() => setVista(id)}
              className="flex-1 py-4"
              style={{
                color: vista === id ? C.bone : C.faint,
                fontFamily: "'Space Grotesk', sans-serif",
                fontWeight: vista === id ? 700 : 400,
                fontSize: 14,
                background: "transparent",
                border: "none",
                borderTop:
                  vista === id ? `2px solid ${C.bone}` : "2px solid transparent",
                cursor: "pointer",
              }}
            >
              {label}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AsistenteWLD />);
</script>
</body>
</html>
